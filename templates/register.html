<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            margin-bottom: 10px;
        }
        .flash-messages {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: var(--radius-md);
            background-color: rgba(255, 107, 107, 0.1);
            color: var(--text-red);
            border: 1px solid rgba(255, 107, 107, 0.2);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="form-wrapper glass-card auth-card">
            
            <a href="{{ url_for('home') }}" class="logo" style="justify-content: center; margin-bottom: 30px;">
                <div class="logo-icon"><i class="ph-fill ph-chart-line-up"></i></div>
                SmartLender
            </a>

            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join us to save and track your predictions.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-messages {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('register') }}" method="POST">
                <div class="input-group full-width" style="margin-bottom: 20px;">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                
                <div class="input-group full-width" style="margin-bottom: 20px;">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group full-width" style="margin-bottom: 30px;">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="submit-btn btn-primary large" style="width: 100%;">
                    Register <i class="ph ph-user-plus"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                Already have an account? <a href="{{ url_for('login') }}" style="color: var(--text-green); font-weight: 500;">Log in here</a>
            </div>
        </div>
    </div>

</body>
</html>
